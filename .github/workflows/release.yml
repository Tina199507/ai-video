name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-electron:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            os: linux
          - platform: macos-latest
            os: mac
          - platform: windows-latest
            os: win

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install all workspace dependencies
        # Root install hoists @ai-video/app-ui-shell + @ai-video/app-desktop
        # workspace deps after the direction A-2/A-3 monorepo move.
        run: npm ci

      - name: Build UI
        run: npm run build --workspace @ai-video/app-ui-shell

      - name: Build backend sidecar
        run: bash scripts/build-sidecar.sh

      - name: Build desktop shell
        run: npm run build --workspace @ai-video/app-desktop

      - name: Package Electron app
        working-directory: apps/desktop
        run: npx electron-builder --config electron-builder.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-app-${{ matrix.os }}
          path: apps/desktop/release/*
          if-no-files-found: warn
